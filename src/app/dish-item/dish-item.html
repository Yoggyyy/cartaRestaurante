<div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-lg transition-shadow">
  <!-- Imagen del plato -->
  @if (dish.image) {
    <img [src]="dish.image" [alt]="dish.name" class="w-full h-48 object-cover" />
  } @else {
    <div class="w-full h-48 bg-gray-200 flex items-center justify-center text-gray-400 text-4xl">
      🍽️
    </div>
  }

  <!-- Info del plato -->
  <div class="p-4">
    <div class="flex justify-between items-start mb-2">
      <h3 class="text-lg font-bold text-gray-800">{{ dish.name }}</h3>
      <span class="text-lg font-bold text-amber-600">{{ dish.price | currency: 'EUR' : 'symbol' }}</span>
    </div>
    <p class="text-gray-600 text-sm mb-3">{{ dish.description }}</p>
    <span class="inline-block bg-amber-100 text-amber-800 text-xs font-semibold px-3 py-1 rounded-full">
      {{ dish.category }}
    </span>
  </div>
</div>
