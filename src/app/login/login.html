<div class="min-h-screen bg-gray-50 flex items-center justify-center px-4">
  <div class="bg-white rounded-xl shadow-lg p-8 w-full max-w-md">
    <h2 class="text-2xl font-bold text-gray-800 text-center mb-6">Iniciar sesión</h2>

    <!-- Mensaje de error -->
    @if (errorMessage) {
      <div class="bg-red-100 text-red-700 px-4 py-3 rounded-lg mb-4 text-sm">
        {{ errorMessage }}
      </div>
    }

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <!-- Campo usuario -->
      <div class="mb-4">
        <label for="username" class="block text-gray-700 font-medium mb-1">Usuario</label>
        <input type="text"
               id="username"
               name="username"
               [(ngModel)]="username"
               required
               maxlength="50"
               #usernameField="ngModel"
               class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-amber-400"
               placeholder="Nombre de usuario" />
        @if (usernameField.invalid && usernameField.touched) {
          <p class="text-red-500 text-xs mt-1">El usuario es obligatorio.</p>
        }
      </div>

      <!-- Campo contraseña -->
      <div class="mb-6">
        <label for="password" class="block text-gray-700 font-medium mb-1">Contraseña</label>
        <input type="password"
               id="password"
               name="password"
               [(ngModel)]="password"
               required
               maxlength="50"
               #passwordField="ngModel"
               class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-amber-400"
               placeholder="Contraseña" />
        @if (passwordField.invalid && passwordField.touched) {
          <p class="text-red-500 text-xs mt-1">La contraseña es obligatoria.</p>
        }
      </div>

      <!-- Botón de login -->
      <button type="submit"
              [disabled]="loginForm.invalid"
              class="w-full bg-amber-500 hover:bg-amber-600 disabled:bg-gray-300 disabled:cursor-not-allowed text-gray-900 font-bold py-2 rounded-lg transition-colors">
        Entrar
      </button>
    </form>
  </div>
</div>
